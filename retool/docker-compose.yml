services:
  postgres:
    image: postgres:16-alpine
    container_name: retool-postgres
    environment:
      POSTGRES_USER: retool
      POSTGRES_PASSWORD: retool123
      POSTGRES_DB: retool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retool"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:7-alpine
    container_name: retool-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  target-postgres:
    image: postgres:16-alpine
    container_name: retool-target-postgres
    environment:
      POSTGRES_USER: sample
      POSTGRES_PASSWORD: sample123
      POSTGRES_DB: sample_db
    ports:
      - "5433:5432"
    volumes:
      - target_postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/sample-db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sample"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  target_postgres_data:
