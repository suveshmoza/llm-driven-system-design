name: Smoke Tests

on:
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 3:00 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  detect-projects:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_projects: ${{ steps.set-matrix.outputs.has_projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: set-matrix
        run: |
          ALL_PROJECTS=$(ls scripts/screenshot-configs/*.json \
            | xargs -I{} basename {} .json \
            | jq -R -s -c 'split("\n") | map(select(. != ""))')

          if [[ "${{ github.event_name }}" == "schedule" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "matrix=${ALL_PROJECTS}" >> "$GITHUB_OUTPUT"
            echo "has_projects=true" >> "$GITHUB_OUTPUT"
          else
            CHANGED_PROJECTS=$(git diff --name-only origin/main...HEAD \
              | cut -d'/' -f1 \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(. != ""))')

            FILTERED=$(jq -n -c \
              --argjson all "${ALL_PROJECTS}" \
              --argjson changed "${CHANGED_PROJECTS}" \
              '$all - ($all - $changed)')

            if [[ "$FILTERED" == "[]" ]]; then
              echo "has_projects=false" >> "$GITHUB_OUTPUT"
              echo "matrix=[]" >> "$GITHUB_OUTPUT"
            else
              echo "has_projects=true" >> "$GITHUB_OUTPUT"
              echo "matrix=${FILTERED}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Print detected projects
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Projects: ${{ steps.set-matrix.outputs.matrix }}"

  smoke-test:
    needs: detect-projects
    if: needs.detect-projects.outputs.has_projects == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.detect-projects.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ${{ matrix.project }}/frontend
        run: npm ci
        continue-on-error: true

      - name: Install backend dependencies
        working-directory: ${{ matrix.project }}/backend
        run: npm ci
        continue-on-error: true

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate smoke tests
        run: npm run generate-tests -- ${{ matrix.project }}

      - name: Run smoke tests
        run: node scripts/run-smoke-tests.mjs ${{ matrix.project }}
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: |
            ${{ matrix.project }}/frontend/playwright-report/
            ${{ matrix.project }}/frontend/test-results/
          retention-days: 14

  smoke-test-summary:
    needs: [detect-projects, smoke-test]
    if: always() && needs.detect-projects.outputs.has_projects == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.smoke-test.result }}" == "failure" ]]; then
            echo "::error::Some smoke tests failed. Check individual project reports."
            exit 1
          fi
          echo "All smoke tests passed."
